<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mi Marca Staff</title>
    <!--
      GitHub Pages SPA Fix
      ────────────────────
      GitHub Pages serves a static 404.html when a URL doesn't match a real file.
      This script redirects unknown paths back to index.html while preserving
      the original URL so React Router can handle it correctly.

      Source technique: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      // The number of path segments to keep in the redirect.
      // For a project site hosted at /REPO-NAME/, use 1.
      // For a user/org site hosted at the root, use 0.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/') +
        '/?p=/' +
        l.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
